<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datu Analīze ar LLM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
        .header { background: #1a1d2e; padding: 24px 40px; border-bottom: 1px solid #2d3148; }
        .header h1 { font-size: 22px; color: #7c8cf8; }
        .header p { font-size: 13px; color: #6b7280; margin-top: 4px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 24px; }
        .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; padding: 28px; margin-bottom: 24px; }
        .card h2 { font-size: 15px; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .btn { padding: 12px 32px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
        .btn-primary { background: #7c8cf8; color: white; }
        .btn-primary:hover { background: #6470e8; }
        .btn-primary:disabled { background: #3d4268; color: #6b7280; cursor: not-allowed; }
        .status { display: inline-block; margin-left: 16px; font-size: 14px; color: #6b7280; vertical-align: middle; }
        .status.running { color: #f59e0b; }
        .status.done { color: #10b981; }
        .log-box { background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; padding: 16px; height: 300px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; }
        .log-line { color: #9ca3af; }
        .log-line.success { color: #10b981; }
        .log-line.error { color: #ef4444; }
        .log-line.header { color: #7c8cf8; }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th { text-align: left; padding: 10px 16px; font-size: 12px; color: #6b7280; text-transform: uppercase; border-bottom: 1px solid #2d3148; }
        .history-table td { padding: 14px 16px; border-bottom: 1px solid #1e2235; font-size: 14px; }
        .history-table tr:last-child td { border-bottom: none; }
        .download-btn { padding: 6px 16px; background: transparent; border: 1px solid #7c8cf8; color: #7c8cf8; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .download-btn:hover { background: #7c8cf8; color: white; }
        .empty { color: #6b7280; font-size: 14px; text-align: center; padding: 24px; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; margin-right: 8px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Automātiskā Datu Analīze ar LLM</h1>
        <p>MySQL datubāze → AI analīze → PDF atskaite</p>
    </div>
    <div class="container">
        <div class="card">
            <h2>Jauna Analīze</h2>
            <button class="btn btn-primary" id="startBtn" onclick="startAnalysis()">▶ Sākt Analīzi</button>
            <span class="status" id="status"></span>
        </div>
        <div class="card">
            <h2>Izpildes Žurnāls</h2>
            <div class="log-box" id="logBox">
                <div class="log-line empty">Žurnāls parādīsies šeit...</div>
            </div>
        </div>
        <div class="card">
            <h2>Pārskatu Vēsture</h2>
            <div id="historyContainer">
                <div class="empty">Ielādē...</div>
            </div>
        </div>
    </div>

    <script>
        let polling = null;

        function startAnalysis() {
            fetch('/start', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'already_running') {
                        alert('Analīze jau notiek!');
                        return;
                    }
                    document.getElementById('startBtn').disabled = true;
                    setStatus('running', 'Analīze notiek...');
                    document.getElementById('logBox').innerHTML = '';
                    polling = setInterval(fetchLogs, 1000);
                });
        }

        function fetchLogs() {
            fetch('/logs')
                .then(r => r.json())
                .then(data => {
                    const box = document.getElementById('logBox');
                    box.innerHTML = data.logs.map(line => {
                        let cls = 'log-line';
                        if (line.includes('✅') || line.includes('PABEIGTS')) cls += ' success';
                        else if (line.includes('Traceback') || line.includes('Error') || line.includes('error')) cls += ' error';
                        else if (line.includes('===') || line.includes('SOLIS')) cls += ' header';
                        return `<div class="${cls}">${line}</div>`;
                    }).join('');
                    box.scrollTop = box.scrollHeight;

                    if (!data.running && data.logs.length > 0) {
                        clearInterval(polling);
                        document.getElementById('startBtn').disabled = false;
                        setStatus('done', 'Analīze pabeigta!');
                        loadHistory();
                    }
                });
        }

        function setStatus(type, text) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            el.innerHTML = type === 'running' ? `<span class="dot"></span>${text}` : text;
        }
